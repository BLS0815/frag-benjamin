<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schild statt Schwert — Hier findest Du Hilfe.</title>
  <meta name="description" content="Betroffenen-Plattform zum Buch „Narzissmus verstehen – Schild statt Schwert" von Benjamin-Lucas Schmidt.">
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="site.css">
  <link rel="icon" type="image/svg+xml" href="assets/shield-mark.svg">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>

  <script type="text/babel" src="ui/primitives.jsx"></script>
  <script type="text/babel" src="EmergencyBar.jsx"></script>
  <script type="text/babel" src="SiteHeader.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="DreiTueren.jsx"></script>
  <script type="text/babel" src="BigQuote.jsx"></script>
  <script type="text/babel" src="BuchSection.jsx"></script>
  <script type="text/babel" src="AppTeaser.jsx"></script>
  <script type="text/babel" src="SiteFooter.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      const [active, setActive] = React.useState('verstehen');
      const scrollTo = (id) => {
        setActive(id);
        const el = document.getElementById(id) || document.getElementById(id === 'sofortzugang' ? 'tueren' : id);
        if (el) {
          const y = el.getBoundingClientRect().top + window.scrollY - 80;
          window.scrollTo({ top: y, behavior: 'smooth' });
        }
      };
      return (
        <div data-screen-label="Website — Startseite">
          <EmergencyBar />
          <SiteHeader active={active} onNavigate={scrollTo} />
          <main>
            <Hero onCTA={scrollTo} />
            <DreiTueren onOpen={scrollTo} />
            <BigQuote />
            <BuchSection />
            <AppTeaser />
          </main>
          <SiteFooter />
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>
</body>
</html>
